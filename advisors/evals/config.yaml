workspace: advisors-workspace
model: claude-sonnet-4-6
grading_model: claude-sonnet-4-6

# baseline_prompt: what a user would reasonably type without the skill
# tools: "" (default) = pure text; panel needs "Agent,Read" for orchestration
skills:
  advisor-visionary:
    path: advisors/skills/advisor-visionary
    baseline_prompt: "Analyze this decision from a visionary perspective — challenge assumptions, identify transformative opportunities, and think big."
  advisor-skeptic:
    path: advisors/skills/advisor-skeptic
    baseline_prompt: "Analyze this decision from a skeptical perspective — question the assumptions, identify failure modes, and demand evidence."
  advisor-operator:
    path: advisors/skills/advisor-operator
    baseline_prompt: "Analyze this decision from an operational perspective — map the resources needed, identify dependencies, and lay out an execution plan."
  advisor-ethicist:
    path: advisors/skills/advisor-ethicist
    baseline_prompt: "Analyze this decision from an ethical perspective — consider who's affected, apply moral frameworks, and assess long-term consequences."
  advisory-panel:
    path: advisors/skills/advisory-panel
    baseline_prompt: "Give me a comprehensive analysis of this decision from four perspectives: visionary, skeptical, operational, and ethical. Then synthesize into a recommendation."
    tools: "Agent,Read"
